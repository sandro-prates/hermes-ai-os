name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    env:
      PYTHONPATH: apps/backend
      UV_EXCLUDE_NEWER: "2026-07-14T11:53:48.187Z"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Verify dependency lock
        run: uv lock --check

      - name: Synchronize locked environment
        run: uv sync --locked --all-extras

      - name: Verify project snapshot
        run: uv run --locked python tools/project_snapshot.py --check

      - name: Run Ruff
        run: uv run --locked ruff check . --no-cache

      - name: Run Pytest
        run: uv run --locked python -m pytest -p no:cacheprovider

      - name: Import application
        run: >-
          uv run --locked python -c
          "from app.main import app;
          print('application=' + app.title + ' version=' + app.version)"

      - name: Verify tracked repository files remain unchanged
        run: git diff --exit-code -- .
